<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Premium Apps - maxs1el</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2f2",
                        "background-dark": "#102222",
                        "accent-purple": "#bc13fe",
                    },
                    fontFamily: { "display": ["Space Grotesk", "sans-serif"] },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100dvh;
        }

        .pixel-bg {
            background-image: linear-gradient(45deg, rgba(13, 242, 242, 0.05) 25%, transparent 25%, transparent 50%, rgba(13, 242, 242, 0.05) 50%, rgba(13, 242, 242, 0.05) 75%, transparent 75%, transparent);
            background-size: 4px 4px;
        }
    </style>
</head>

<body class="bg-background-dark font-display text-slate-100 antialiased">
    <div class="relative flex min-h-screen w-full flex-col bg-background-dark overflow-x-hidden">
        <!-- Header -->
        <header class="flex items-center bg-background-dark p-4 pb-2 justify-between border-b border-primary/10">
            <div class="text-primary flex size-12 shrink-0 items-center justify-center">
                <span class="material-symbols-outlined text-3xl">videogame_asset</span>
            </div>
            <h2 class="text-slate-100 text-xl font-bold leading-tight tracking-tight flex-1 text-center uppercase">
                Premium Apps</h2>
            <div class="flex w-12 items-center justify-end"></div>
        </header>

        <!-- Category Filter -->
        <div class="flex gap-3 p-4 overflow-x-auto" id="categoryFilter">
            <button onclick="filterCategory('')"
                class="cat-btn active flex h-10 shrink-0 items-center justify-center gap-x-2 rounded bg-primary text-background-dark px-4 font-bold border-b-4 border-primary/40">
                <span class="text-sm uppercase">All</span>
                <span class="material-symbols-outlined text-lg">filter_list</span>
            </button>
        </div>

        <!-- Product List -->
        <div class="flex flex-col gap-6 p-4" id="productList">
            <div class="text-center text-slate-500 py-8">Loading products...</div>
        </div>

        <div class="h-24 bg-background-dark"></div>

        <!-- Bottom Navigation -->
        <div class="fixed bottom-0 left-0 right-0 flex flex-col z-50">
            <div class="flex gap-2 border-t border-primary/20 bg-background-dark/95 backdrop-blur-md px-4 pb-6 pt-3">
                <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-primary transition-colors"
                    href="/">
                    <span class="material-symbols-outlined text-2xl">home</span>
                    <p class="text-[10px] font-bold uppercase tracking-wider">Home</p>
                </a>
                <a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary relative" href="/store">
                    <div class="absolute -top-1 w-12 h-1 bg-primary rounded-full"></div>
                    <span class="material-symbols-outlined text-2xl"
                        style="font-variation-settings: 'FILL' 1">sports_esports</span>
                    <p class="text-[10px] font-bold uppercase tracking-wider">Store</p>
                </a>
                <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-primary transition-colors"
                    href="/daily">
                    <span class="material-symbols-outlined text-2xl">palette</span>
                    <p class="text-[10px] font-bold uppercase tracking-wider">Daily</p>
                </a>
                <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400 hover:text-primary transition-colors"
                    href="/profile">
                    <span class="material-symbols-outlined text-2xl">person</span>
                    <p class="text-[10px] font-bold uppercase tracking-wider">Profile</p>
                </a>
            </div>
        </div>
    </div>

    <script>
        const categoryColors = { 'Streaming': 'accent-purple', 'Music': 'primary', 'Video': 'accent-purple', 'Gaming': 'primary' };

        function formatRupiah(num) {
            return 'Rp ' + Number(num).toLocaleString('id-ID');
        }

        let allProducts = [];
        let categories = [];

        async function loadProducts() {
            try {
                const [prodRes, catRes] = await Promise.all([
                    fetch('/api/products'), fetch('/api/products/categories')
                ]);
                allProducts = await prodRes.json();
                categories = await catRes.json();

                // Build category buttons
                const filterDiv = document.getElementById('categoryFilter');
                categories.forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'cat-btn flex h-10 shrink-0 items-center justify-center gap-x-2 rounded bg-primary/10 text-primary px-4 font-bold border-b-4 border-primary/20';
                    btn.innerHTML = `<span class="text-sm uppercase">${cat}</span>`;
                    btn.onclick = () => filterCategory(cat);
                    filterDiv.appendChild(btn);
                });

                renderProducts(allProducts);
            } catch (err) {
                document.getElementById('productList').innerHTML = '<p class="text-center text-red-400 py-8">Failed to load products</p>';
            }
        }

        function filterCategory(cat) {
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.className = btn.className.replace('bg-primary text-background-dark', 'bg-primary/10 text-primary').replace('border-primary/40', 'border-primary/20');
            });
            event.target.closest('.cat-btn').className = event.target.closest('.cat-btn').className.replace('bg-primary/10 text-primary', 'bg-primary text-background-dark').replace('border-primary/20', 'border-primary/40');

            const filtered = cat ? allProducts.filter(p => p.category === cat) : allProducts;
            renderProducts(filtered);
        }

        function renderProducts(products) {
            const container = document.getElementById('productList');
            if (products.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-500 py-8">No products found</p>';
                return;
            }
            container.innerHTML = products.map(p => {
                const colorClass = categoryColors[p.category] || 'primary';
                return `
        <div class="flex items-stretch justify-between gap-4 rounded-xl bg-primary/5 border border-primary/20 p-5 shadow-lg relative overflow-hidden group">
            <div class="absolute top-0 right-0 w-24 h-24 bg-${colorClass}/10 blur-3xl rounded-full -mr-10 -mt-10"></div>
            <div class="flex flex-[2_2_0px] flex-col gap-4 relative z-10">
                <div class="flex flex-col gap-1">
                    <span class="text-${colorClass} text-[10px] font-bold uppercase tracking-widest px-2 py-0.5 bg-${colorClass}/10 w-fit rounded">${p.category}</span>
                    <h3 class="text-slate-100 text-lg font-bold leading-tight">${p.name}</h3>
                    <p class="text-slate-400 text-xs font-normal leading-normal">${(p.features || []).join(' | ')}</p>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-primary text-xl font-bold">${formatRupiah(p.price)}</span>
                    <a href="/product.html?id=${p.id}" class="flex min-w-[100px] cursor-pointer items-center justify-center rounded h-10 px-4 bg-primary text-background-dark gap-2 text-sm font-bold uppercase tracking-tighter border-b-4 border-primary/50 hover:translate-y-0.5 transition-all">
                        <span>Buy Now</span>
                        <span class="material-symbols-outlined text-sm">shopping_cart</span>
                    </a>
                </div>
            </div>
            <div class="w-24 h-24 bg-center bg-no-repeat bg-cover rounded-lg flex-1 border-2 border-primary/30 pixel-bg" style="background-image: url('${p.image || ''}')"></div>
        </div>`;
            }).join('');
        }

        loadProducts();
    </script>
</body>

</html>
