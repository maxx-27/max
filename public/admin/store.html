<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Store Management - maxs1el</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0df2f2",
                        "accent": "#bf00ff",
                        "background-dark": "#0a0f0f",
                        "card-dark": "#161d1d",
                    },
                    fontFamily: { "display": ["Space Grotesk"] },
                    borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            min-height: 100dvh;
        }

        .neon-glow-cyan {
            box-shadow: 0 0 15px rgba(13, 242, 242, 0.4);
        }
    </style>
</head>

<body class="bg-background-dark font-display text-slate-100 min-h-screen pb-24">
    <!-- Header -->
    <header class="border-b border-primary/20 bg-card-dark/80 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center justify-between p-4 max-w-2xl mx-auto">
            <div class="flex items-center gap-3">
                <div class="text-primary bg-primary/10 p-2 rounded-lg">
                    <span class="material-symbols-outlined text-3xl">storefront</span>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight text-slate-100 uppercase">maxs1el <span
                            class="text-primary">Store</span></h1>
                    <p class="text-xs text-slate-400 font-medium">STORE MANAGEMENT</p>
                </div>
            </div>
            <a href="/admin/dashboard"
                class="bg-accent/10 text-accent p-2 rounded-xl hover:bg-accent/20 transition-colors">
                <span class="material-symbols-outlined">dashboard</span>
            </a>
        </div>
    </header>

    <main class="max-w-2xl mx-auto p-4 space-y-8">
        <!-- Add Product -->
        <section class="space-y-4">
            <h2 class="text-lg font-bold flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">add_box</span> CRAFT NEW ITEM
            </h2>
            <div class="bg-card-dark border-2 border-primary/30 rounded-xl p-6 space-y-4 neon-glow-cyan">
                <div class="space-y-1">
                    <label class="text-xs font-bold uppercase tracking-wider text-slate-500">Product Name</label>
                    <input id="newName"
                        class="w-full bg-slate-900 border-slate-700 rounded-lg p-3 focus:ring-primary focus:border-primary text-slate-100"
                        placeholder="e.g. Netflix Premium" type="text" />
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold uppercase tracking-wider text-slate-500">Price (IDR)</label>
                        <div class="relative">
                            <span
                                class="absolute left-3 top-1/2 -translate-y-1/2 text-primary font-bold text-sm">Rp</span>
                            <input id="newPrice"
                                class="w-full bg-slate-900 border-slate-700 rounded-lg pl-10 p-3 focus:ring-primary focus:border-primary text-slate-100"
                                placeholder="249000" type="number" />
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold uppercase tracking-wider text-slate-500">Category</label>
                        <input id="newCategory"
                            class="w-full bg-slate-900 border-slate-700 rounded-lg p-3 focus:ring-primary focus:border-primary text-slate-100"
                            placeholder="Streaming" type="text" />
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold uppercase tracking-wider text-slate-500">Description /
                        Features</label>
                    <input id="newDesc"
                        class="w-full bg-slate-900 border-slate-700 rounded-lg p-3 focus:ring-primary focus:border-primary text-slate-100"
                        placeholder="4K + HDR | 4 Screens" type="text" />
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold uppercase tracking-wider text-slate-500">Image URL</label>
                    <input id="newImage"
                        class="w-full bg-slate-900 border-slate-700 rounded-lg p-3 focus:ring-primary focus:border-primary text-slate-100"
                        placeholder="https://..." type="url" />
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold uppercase tracking-wider text-slate-500">Stock</label>
                    <input id="newStock"
                        class="w-full bg-slate-900 border-slate-700 rounded-lg p-3 focus:ring-primary focus:border-primary text-slate-100"
                        placeholder="100" type="number" value="100" />
                </div>
                <button onclick="createProduct()"
                    class="w-full bg-primary text-background-dark font-bold py-3 rounded-lg flex items-center justify-center gap-2 hover:brightness-110 transition-all uppercase tracking-widest shadow-[0_4px_0_0_#06b6b6]">
                    <span class="material-symbols-outlined">bolt</span> List Product
                </button>
            </div>
        </section>

        <!-- Add Account to Product -->
        <section class="space-y-4">
            <h2 class="text-lg font-bold flex items-center gap-2">
                <span class="material-symbols-outlined text-accent">key</span> ADD ACCOUNT TO PRODUCT
            </h2>
            <div class="bg-card-dark border-2 border-accent/30 rounded-xl p-6 space-y-4">
                <div class="space-y-1">
                    <label class="text-xs font-bold uppercase tracking-wider text-slate-500">Select Product</label>
                    <select id="accountProduct"
                        class="w-full bg-slate-900 border-slate-700 rounded-lg p-3 text-slate-100">
                        <option value="">Loading products...</option>
                    </select>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-xs font-bold uppercase tracking-wider text-slate-500">Email/Username</label>
                        <input id="accEmail" class="w-full bg-slate-900 border-slate-700 rounded-lg p-3 text-slate-100"
                            placeholder="user@example.com" type="text" />
                    </div>
                    <div class="space-y-1">
                        <label class="text-xs font-bold uppercase tracking-wider text-slate-500">Password</label>
                        <input id="accPassword"
                            class="w-full bg-slate-900 border-slate-700 rounded-lg p-3 text-slate-100"
                            placeholder="pass123" type="text" />
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold uppercase tracking-wider text-slate-500">Invite Link
                        (optional)</label>
                    <input id="accInvite" class="w-full bg-slate-900 border-slate-700 rounded-lg p-3 text-slate-100"
                        placeholder="https://invite.link/..." type="text" />
                </div>
                <button onclick="addAccount()"
                    class="w-full bg-accent text-white font-bold py-3 rounded-lg flex items-center justify-center gap-2 hover:brightness-110 transition-all uppercase tracking-widest">
                    <span class="material-symbols-outlined">person_add</span> Add Account
                </button>
            </div>
        </section>

        <!-- Inventory -->
        <section class="space-y-4">
            <div class="flex items-center justify-between">
                <h2 class="text-lg font-bold flex items-center gap-2">
                    <span class="material-symbols-outlined text-accent">inventory_2</span> CURRENT INVENTORY
                </h2>
                <span id="itemCount" class="text-xs font-bold bg-slate-800 px-3 py-1 rounded-full text-slate-400">0
                    ITEMS</span>
            </div>
            <div id="productList" class="space-y-3">
                <div class="text-center text-slate-500 py-4">Loading...</div>
            </div>
        </section>
    </main>

    <script>
        const token = localStorage.getItem('maxs1el_token');
        if (!token) window.location.href = '/admin/login';

        function formatRupiah(n) { return 'Rp ' + Number(n).toLocaleString('id-ID'); }
        const headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };

        async function loadProducts() {
            try {
                const res = await fetch('/api/products');
                const products = await res.json();
                document.getElementById('itemCount').textContent = products.length + ' ITEMS ACTIVE';

                // Populate select
                const sel = document.getElementById('accountProduct');
                sel.innerHTML = '<option value="">-- Select Product --</option>' + products.map(p =>
                    `<option value="${p.id}">${p.name} (${formatRupiah(p.price)})</option>`
                ).join('');

                const container = document.getElementById('productList');
                container.innerHTML = products.map(p => `
            <div class="group bg-card-dark border border-slate-800 rounded-xl p-4 flex items-center gap-4 hover:border-primary/50 transition-all">
                <div class="h-16 w-16 bg-slate-800 rounded-lg overflow-hidden flex-shrink-0 border border-slate-700">
                    ${p.image ? `<img class="h-full w-full object-cover" src="${p.image}"/>` : '<div class="h-full w-full flex items-center justify-center"><span class="material-symbols-outlined text-slate-600">image</span></div>'}
                </div>
                <div class="flex-grow min-w-0">
                    <h3 class="font-bold text-slate-100 truncate">${p.name}</h3>
                    <p class="text-primary font-bold">${formatRupiah(p.price)}</p>
                    <p class="text-slate-500 text-xs">${p.category} | Stock: ${p.stock}</p>
                </div>
                <div class="flex gap-2 flex-shrink-0">
                    <button onclick="deleteProduct(${p.id})" class="h-10 w-10 flex items-center justify-center rounded-lg bg-slate-800 text-slate-400 hover:text-red-500 transition-colors">
                        <span class="material-symbols-outlined text-xl">delete</span>
                    </button>
                </div>
            </div>
        `).join('');
            } catch (err) { console.error(err); }
        }

        async function createProduct() {
            const body = {
                name: document.getElementById('newName').value,
                price: document.getElementById('newPrice').value,
                category: document.getElementById('newCategory').value || 'General',
                description: document.getElementById('newDesc').value,
                features: document.getElementById('newDesc').value,
                image: document.getElementById('newImage').value,
                stock: document.getElementById('newStock').value || 100,
            };
            if (!body.name || !body.price) return alert('Name and price required');
            try {
                await fetch('/api/products', { method: 'POST', headers, body: JSON.stringify(body) });
                ['newName', 'newPrice', 'newCategory', 'newDesc', 'newImage'].forEach(id => document.getElementById(id).value = '');
                loadProducts();
            } catch (err) { alert('Error creating product'); }
        }

        async function addAccount() {
            const productId = document.getElementById('accountProduct').value;
            if (!productId) return alert('Select a product');
            const body = {
                email: document.getElementById('accEmail').value,
                password: document.getElementById('accPassword').value,
                invite_link: document.getElementById('accInvite').value,
            };
            if (!body.email && !body.invite_link) return alert('Email or invite link required');
            try {
                const res = await fetch(`/api/products/${productId}/accounts`, { method: 'POST', headers, body: JSON.stringify(body) });
                if (res.ok) {
                    alert('Account added!');
                    ['accEmail', 'accPassword', 'accInvite'].forEach(id => document.getElementById(id).value = '');
                } else {
                    const data = await res.json();
                    alert(data.error || 'Error');
                }
            } catch (err) { alert('Error adding account'); }
        }

        async function deleteProduct(id) {
            if (!confirm('Delete this product?')) return;
            await fetch('/api/products/' + id, { method: 'DELETE', headers });
            loadProducts();
        }

        loadProducts();
    </script>
</body>

</html>
