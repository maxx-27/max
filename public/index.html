<!DOCTYPE html>
<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>maxs1el | Digital Creator</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#0df2f2",
            "secondary": "#9d00ff",
            "background-dark": "#0a0f0f",
            "surface": "#161e1e",
            "surface-accent": "#1e2b2b"
          },
          fontFamily: { "display": ["Space Grotesk", "sans-serif"] },
          borderRadius: { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Space Grotesk', sans-serif;
    }

    .neon-glow {
      box-shadow: 0 0 15px rgba(13, 242, 242, 0.3);
    }

    .gradient-mesh {
      background-color: #0a0f0f;
      background-image:
        radial-gradient(at 0% 0%, rgba(13, 242, 242, 0.15) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(157, 0, 255, 0.15) 0px, transparent 50%);
    }
  </style>
</head>

<body class="bg-background-dark text-slate-100 min-h-screen font-display gradient-mesh">
  <div class="relative flex min-h-screen w-full flex-col max-w-md mx-auto border-x border-primary/10 shadow-2xl">
    <!-- Header -->
    <header
      class="flex items-center bg-background-dark/80 backdrop-blur-md sticky top-0 z-50 p-4 justify-between border-b border-primary/10">
      <a href="/menu"
        class="flex size-10 items-center justify-center rounded-xl bg-surface hover:bg-surface-accent transition-colors">
        <span class="material-symbols-outlined text-primary">menu</span>
      </a>
      <span class="text-primary font-bold tracking-tighter text-xl">MAXS1EL</span>
      <button onclick="shareLink()"
        class="flex size-10 items-center justify-center rounded-xl bg-surface hover:bg-surface-accent transition-colors">
        <span class="material-symbols-outlined text-primary">share</span>
      </button>
    </header>

    <main class="flex-grow">
      <!-- Profile -->
      <div class="flex p-8 flex-col items-center">
        <div class="relative group">
          <div
            class="absolute -inset-1 bg-gradient-to-r from-primary to-secondary rounded-full blur opacity-50 group-hover:opacity-100 transition duration-1000">
          </div>
          <div id="avatar"
            class="relative bg-center bg-no-repeat aspect-square bg-cover rounded-full h-32 w-32 border-2 border-primary/30"
            style="background-image: url('/uploads/default-avatar.png')"></div>
        </div>
        <div class="mt-6 flex flex-col items-center text-center">
          <h1 id="profileName" class="text-white text-3xl font-bold tracking-tight">@maxs1el</h1>
          <p id="profileTitle" class="text-primary font-medium mt-1">Digital Creator</p>
          <div id="profileBadge" class="flex items-center gap-1 mt-2 text-slate-400 text-sm">
            <span class="material-symbols-outlined text-xs">verified</span>
            <span>Level 42 Explorer</span>
          </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-3 w-full mt-8">
          <div class="flex flex-col gap-1 rounded-xl bg-surface border border-primary/10 p-4 items-center text-center">
            <p id="statProducts" class="text-slate-100 text-xl font-bold">0</p>
            <p class="text-slate-500 text-xs uppercase tracking-widest font-semibold">Products</p>
          </div>
          <div class="flex flex-col gap-1 rounded-xl bg-surface border border-primary/10 p-4 items-center text-center">
            <p id="statLinks" class="text-slate-100 text-xl font-bold">0</p>
            <p class="text-slate-500 text-xs uppercase tracking-widest font-semibold">Links</p>
          </div>
          <div class="flex flex-col gap-1 rounded-xl bg-surface border border-primary/10 p-4 items-center text-center">
            <p id="statSkills" class="text-slate-100 text-xl font-bold">0</p>
            <p class="text-slate-500 text-xs uppercase tracking-widest font-semibold">Skills</p>
          </div>
        </div>

        <!-- Quick Links -->
        <div class="w-full mt-8 space-y-4">
          <h2 class="text-slate-400 text-xs font-bold uppercase tracking-[0.2em] text-center">Quick Links</h2>
          <div id="linksContainer" class="space-y-3">
            <div class="text-center text-slate-500 py-4">Loading...</div>
          </div>
        </div>
      </div>
      <div class="h-24"></div>
    </main>

    <!-- Bottom Nav -->
    <footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto z-50">
      <div
        class="flex items-center justify-around gap-2 border-t border-primary/10 bg-background-dark/90 backdrop-blur-xl px-4 py-3 rounded-t-2xl shadow-[0_-4px_20px_rgba(0,0,0,0.5)]">
        <a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="/">
          <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">home</span>
          <span class="text-[10px] font-bold uppercase tracking-widest">Home</span>
        </a>
        <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 hover:text-primary transition-colors"
          href="/store">
          <span class="material-symbols-outlined">sports_esports</span>
          <span class="text-[10px] font-bold uppercase tracking-widest">Store</span>
        </a>
        <div class="flex-1 flex justify-center -mt-8">
          <a href="/admin/login"
            class="bg-gradient-to-br from-primary to-secondary size-14 rounded-full flex items-center justify-center shadow-lg shadow-primary/25 border-4 border-background-dark group hover:scale-105 transition-transform active:scale-95">
            <span class="material-symbols-outlined text-background-dark text-3xl font-bold">add</span>
          </a>
        </div>
        <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 hover:text-primary transition-colors"
          href="/daily">
          <span class="material-symbols-outlined">terminal</span>
          <span class="text-[10px] font-bold uppercase tracking-widest">Daily</span>
        </a>
        <a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-500 hover:text-primary transition-colors"
          href="/profile">
          <span class="material-symbols-outlined">person</span>
          <span class="text-[10px] font-bold uppercase tracking-widest">Profile</span>
        </a>
      </div>
      <div class="bg-background-dark/90 h-4"></div>
    </footer>
  </div>

  <script>
    async function loadData() {
      try {
        const [profileRes, linksRes, productsRes] = await Promise.all([
          fetch('/api/profile'), fetch('/api/links'), fetch('/api/products')
        ]);
        const profile = await profileRes.json();
        const links = await linksRes.json();
        const products = await productsRes.json();

        document.getElementById('profileName').textContent = '@' + (profile.name || 'maxs1el');
        document.getElementById('profileTitle').textContent = profile.title || 'Digital Creator';
        document.getElementById('profileBadge').querySelector('span:last-child').textContent = profile.badge_text || '';
        if (profile.avatar) document.getElementById('avatar').style.backgroundImage = `url('${profile.avatar}')`;

        document.getElementById('statProducts').textContent = products.length;
        document.getElementById('statLinks').textContent = links.length;
        document.getElementById('statSkills').textContent = (profile.skills || []).length;

        const container = document.getElementById('linksContainer');
        container.innerHTML = links.map(link => `
            <a href="${link.url}" target="_blank" onclick="trackClick(${link.id})"
               class="flex items-center justify-between p-4 bg-surface hover:bg-surface-accent border border-primary/5 rounded-xl transition-all group">
                <div class="flex items-center gap-3">
                    <div class="size-10 rounded-lg bg-primary/10 flex items-center justify-center group-hover:bg-primary/20 transition-colors">
                        <span class="material-symbols-outlined text-primary">${link.icon || 'link'}</span>
                    </div>
                    <span class="font-semibold text-slate-100">${link.title}</span>
                </div>
                <span class="material-symbols-outlined text-slate-600 group-hover:text-primary transition-colors">chevron_right</span>
            </a>
        `).join('');
      } catch (err) { console.error('Load error:', err); }
    }

    function trackClick(id) { fetch('/api/links/click/' + id, { method: 'POST' }).catch(() => { }); }
    function shareLink() {
      if (navigator.share) navigator.share({ title: 'maxs1el', url: window.location.href });
      else navigator.clipboard.writeText(window.location.href).then(() => alert('Link copied!'));
    }

    loadData();
  </script>
</body>

</html>
